name: wheels

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions: {}

jobs:
  # Does this change touch anything that can alter the built wheel? Non-build
  # PRs skip the matrix below but still reach `wheels-gate`, the one required
  # check, so a docs- or Python-only PR is not blocked waiting on builds it
  # never triggers, while a build-affecting PR must pass them. Runs on every
  # event; the output is only consulted for pull requests.
  changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      build: ${{ steps.filter.outputs.build }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: dorny/paths-filter@d1c1ffe0248fe513906c8e24db8ea791d46f8590 # v3
        id: filter
        with:
          filters: |
            build:
              - ".github/workflows/wheels.yml"
              - "Cargo.toml"
              - "Cargo.lock"
              - "crates/**"
              - "pyproject.toml"

  linux:
    needs: changes
    if: ${{ github.event_name != 'pull_request' || needs.changes.outputs.build == 'true' }}
    runs-on: ${{ matrix.platform.runner }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        platform:
          - runner: ubuntu-24.04
            target: x86_64
          - runner: ubuntu-24.04-arm
            target: aarch64
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - name: Build wheel
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist
          sccache: ${{ !startsWith(github.ref, 'refs/tags/') }}
          manylinux: auto
      - name: Upload wheel
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: wheels-linux-${{ matrix.platform.target }}
          path: dist

  macos:
    needs: changes
    if: ${{ github.event_name != 'pull_request' || needs.changes.outputs.build == 'true' }}
    runs-on: ${{ matrix.platform.runner }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        platform:
          - runner: macos-latest
            target: aarch64
          - runner: macos-15-intel
            target: x86_64
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - name: Build wheel
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist
          sccache: ${{ !startsWith(github.ref, 'refs/tags/') }}
      - name: Upload wheel
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: wheels-macos-${{ matrix.platform.target }}
          path: dist

  windows:
    needs: changes
    if: ${{ github.event_name != 'pull_request' || needs.changes.outputs.build == 'true' }}
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.13"
          architecture: x64
      - name: Build wheel
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1
        with:
          target: x64
          args: --release --out dist
          sccache: ${{ !startsWith(github.ref, 'refs/tags/') }}
      - name: Upload wheel
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: wheels-windows-x64
          path: dist

  sdist:
    needs: changes
    if: ${{ github.event_name != 'pull_request' || needs.changes.outputs.build == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - name: Build sdist
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1
        with:
          command: sdist
          args: --out dist
      - name: Upload sdist
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: wheels-sdist
          path: dist

  # Always-running fan-in: the single required status check for the build
  # matrix. Passes when every build job succeeded or was skipped (a non-build
  # PR), fails if any did not — so the matrix can stay conditional without the
  # branch ruleset waiting forever on contexts that never report.
  wheels-gate:
    needs: [changes, linux, macos, windows, sdist]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Require the wheel builds to pass or be skipped
        run: |
          results="${{ join(needs.*.result, ' ') }}"
          echo "build job results: $results"
          for result in $results; do
            case "$result" in
              success | skipped) ;;
              *)
                echo "::error::a wheel build did not pass ($result)"
                exit 1
                ;;
            esac
          done

  release:
    name: Release
    runs-on: ubuntu-latest
    if: ${{ startsWith(github.ref, 'refs/tags/') }}
    needs: [linux, macos, windows, sdist]
    environment: pypi
    permissions:
      # Trusted publishing (OIDC) and artifact attestation
      id-token: write
      contents: write
      attestations: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
      - name: Generate artifact attestation
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4
        with:
          subject-path: "wheels-*/*"
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          # This job only runs `uv publish`, which installs nothing, so there
          # is nothing to cache against.
          enable-cache: false
      - name: Publish to PyPI
        run: uv publish --trusted-publishing always 'wheels-*/*'
      - name: Create GitHub Release
        # Notes come from the tag's CHANGELOG section; the built wheels and
        # sdist are attached. Runs after the PyPI publish, so a release only
        # appears once the artifacts are live. Tagging is the only manual step.
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          scripts/changelog-section.sh "${GITHUB_REF_NAME#v}" > release-notes.md
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --notes-file release-notes.md \
            wheels-*/*
