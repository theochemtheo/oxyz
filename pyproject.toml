[build-system]
requires = ["maturin>=1.8,<2"]
build-backend = "maturin"

[project]
name = "atomflow"
version = "0.1.0"
requires-python = ">=3.11"
license = "MIT OR Apache-2.0"
dependencies = [
    "numpy>=2",
]

[project.optional-dependencies]
# <4: ASEv4 may change the data model; new majors are opted into deliberately.
ase = ["ase>=3.28,<4"]

[dependency-groups]
bench = [
    "ase>=3.28.0,<4",
    "pytest-benchmark>=5.2.3",
]
dev = [
    "maturin>=1.13.3",
    "prek>=0.4.4",
    "pytest>=9.0.3",
    "ruff>=0.15.16",
    "ty>=0.0.44",
]

[tool.uv]
# Rebuild the editable extension (release, via maturin PEP517) whenever the
# Rust sources change, so `uv run` never tests or benchmarks a stale build.
cache-keys = [
    { file = "pyproject.toml" },
    { file = "Cargo.toml" },
    { file = "Cargo.lock" },
    { file = "crates/**/Cargo.toml" },
    { file = "crates/**/*.rs" },
]

[tool.ruff]
target-version = "py311"
src = ["src", "tests"]

[tool.ruff.lint]
select = [
    "E",
    "F",
    "I",
    "UP",
    "B",
    "SIM",
]

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.maturin]
manifest-path = "crates/atomflow-py/Cargo.toml"
module-name = "atomflow._rust"
python-source = "src"
features = ["extension-module"]
